# ============================================================
# GeekMagic SmallTV-Ultra (ESP8266 / robotcity board)
# v2: network + control + ST7789 240x240 display (clock)
# Display uses lhartmann's fractional-framebuffer fork so the
# 240x240 panel fits in ESP8266 RAM (streamed in fragments).
# ============================================================
esphome:
  name: smalltv-ultra
  friendly_name: SmallTV Ultra
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 50%

esp8266:
  board: esp01_1m
  restore_from_flash: true

external_components:
  # Local patched copy of lhartmann's fractional-framebuffer st7789v.
  # This panel needs inversion ON (INVON) — verified via color test card.
  - source:
      type: local
      path: components
    components: [st7789v]

logger:

# reboot_timeout 0s: do NOT reboot when no Home Assistant client is
# connected (default 15min -> spurious reboots when running standalone).
api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

# RECOVERY NET: if the device reboot-loops for any reason, boot into a
# minimal WiFi+OTA-only mode (no display/heavy code) so we can always
# re-flash over the air WITHOUT serial. boot_is_good_after is long so
# even a slow (every-few-minutes) loop eventually trips safe mode.
safe_mode:
  boot_is_good_after: 10min
  num_attempts: 10
  reboot_timeout: 5min

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "SmallTV-Ultra Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Seoul

# ---------------- Display stack ----------------
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

output:
  - id: pwm_output
    platform: esp8266_pwm
    pin: GPIO05
    inverted: true
    frequency: 1000 Hz

light:
  - platform: monochromatic
    output: pwm_output
    name: "Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON

font:
  - file: "gfonts://Roboto@medium"
    id: font_big
    size: 60
  - file: "gfonts://Roboto"
    id: font_med
    size: 22
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

display:
  - id: my_display
    platform: st7789v
    model: custom
    spi_id: spihwd
    cs_pin: GPIO15
    dc_pin: GPIO00
    reset_pin: GPIO02
    height: 240
    width: 240
    offset_height: 0
    offset_width: 0
    fragmentation: 30
    eightbitcolor: False
    spi_mode: mode3
    data_rate: 40000000
    update_interval: never
    auto_clear_enabled: False
    pages:
      - id: page_clock
        lambda: |-
          it.fill(Color(0x000000));                 // true black
          auto t = id(sntp_time).now();
          // vivid accent bars
          it.filled_rectangle(0,   0, 240, 8, Color(0x00E5FF));  // cyan
          it.filled_rectangle(0, 232, 240, 8, Color(0xFF2D95));  // magenta
          if (t.is_valid()) {
            it.strftime(120, 104, id(font_big),  Color(0xFFFFFF), TextAlign::CENTER, "%H:%M", t);
            it.strftime(120, 156, id(font_med),  Color(0xFFB000), TextAlign::CENTER, "%Y-%m-%d", t);
            // seconds progress bar with a glowing head
            int w = (int)(t.second * (200.0f / 59.0f));
            it.filled_rectangle(20, 198, 200, 4, Color(0x203040));
            it.filled_rectangle(20, 198, w,   4, Color(0x00FF7F));  // vivid green
            it.filled_circle(20 + w, 200, 5, Color(0x7CFFC4));
          } else {
            it.printf(120, 120, id(font_med), Color(0x00E5FF), TextAlign::CENTER, "syncing time...");
          }

interval:
  - interval: 1s
    then:
      # Only drive the (CPU-heavy) display refresh while Wi-Fi is connected.
      # If Wi-Fi drops, the display stops hogging the single core so the
      # radio can re-associate — self-healing, prevents the earlier lockup.
      - if:
          condition:
            wifi.connected:
          then:
            - component.update: my_display

# ---------------- Telemetry ----------------
text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s
