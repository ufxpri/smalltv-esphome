# ============================================================
# core.yaml — shared base for every build.
# The display component + the `mode` selector + page deps are
# GENERATED by tools/build.py from the selected pages/. Do not
# add a `display:` or `select: mode` here.
# ============================================================
esphome:
  name: smalltv-ultra
  friendly_name: SmallTV Ultra
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 50%

esp8266:
  board: esp01_1m
  restore_from_flash: true

external_components:
  # Local patched fractional-framebuffer ST7789 (streams 240x240 in
  # fragments to fit ESP8266 RAM). This panel needs inversion ON (INVON).
  - source:
      type: local
      path: components
    components: [st7789v]

logger:

# reboot_timeout 0s: don't reboot when no Home Assistant client is connected.
api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

# RECOVERY NET: any reboot loop -> minimal WiFi+OTA-only mode, re-flash over
# the air without serial. Long boot_is_good_after catches slow loops too.
safe_mode:
  boot_is_good_after: 10min
  num_attempts: 10
  reboot_timeout: 5min

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "SmallTV-Ultra Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Seoul

# Health telemetry used by the generated top warning bar.
globals:
  - id: g_last_render      # ms the previous display fragment took to draw
    type: uint32_t
    restore_value: false
    initial_value: '0'
  # Dirty-flag rendering: only redraw the screen when something actually changed
  # (data push or page switch). The ST7789 keeps the last image in its own GRAM,
  # so between changes the core stays idle instead of re-rasterizing 30x/second.
  - id: g_dirty
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: g_last_draw        # millis() of the last real redraw (safety fallback)
    type: uint32_t
    restore_value: false
    initial_value: '0'

# ---------------- Display hardware plumbing (shared) ----------------
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

output:
  - id: pwm_output
    platform: esp8266_pwm
    pin: GPIO05
    inverted: true
    frequency: 1000 Hz

light:
  - platform: monochromatic
    output: pwm_output
    name: "Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON

# Shared fonts. Page-specific fonts go in that page's `requires:`.
font:
  - file: "gfonts://Roboto@medium"
    id: font_big
    size: 60
  - file: "gfonts://Roboto"
    id: font_med
    size: 22
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

# Refresh the (generated) display ONLY while WiFi is connected, so a heavy
# page can never starve the single core and lock the radio out. Self-healing.
# And only when needed: the active page is time-driven (Clock), something set
# g_dirty, or the 30 s safety fallback elapsed (guards against a missed flag).
interval:
  - interval: 1s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                uint32_t now = millis();
                bool time_page = id(disp_mode).state == "Clock";
                if (time_page || id(g_dirty) || (now - id(g_last_draw) > 30000)) {
                  id(my_display)->update();
                  id(g_dirty) = false;
                  id(g_last_draw) = now;
                }

# ---------------- Telemetry ----------------
text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 30s
