name: Weather
description: >
  STUB — draws a placeholder, not real weather. Wire a data source to finish it:
  push values from the PC into text entities, or add an on-device http_request
  in `requires`. Kept minimal (52 B RAM) so it costs almost nothing meanwhile.
  Note the local page set is deliberately lean; anything heavy belongs in a PC
  stream source instead (see client/stream_stocks.py).
author: you

requires: ""

render: |
  it.printf(120, 92, id(font_med), Color(0x00E5FF), TextAlign::CENTER, "Weather");
  it.printf(120, 132, id(font_small), Color(0x808A94), TextAlign::CENTER, "configure a data source");
