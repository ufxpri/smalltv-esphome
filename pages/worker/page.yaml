name: Worker
description: >
  "Claude Code hard at work" furnace. A PC bridge pushes CPU load (0-100) to
  `cpu_load`; the busier the machine, the taller/hotter the flames, the higher
  the load bar, and the more frantic the status (IDLE -> WORKING -> MELTDOWN).
  Inspired by desk gadgets that get busier as the AI works. Draws entirely with
  display primitives (no bitmap) to fit the ESP8266.
author: you

# The PC bridge sets this over REST every ~1 s: POST /text/cpu_load/set?value=NN
# on_value flags a redraw (dirty-flag rendering), so the fire animates per push.
requires: |
  text:
    - platform: template
      name: "cpu_load"
      id: cpu_load
      optimistic: true
      mode: text
      min_length: 0
      max_length: 4
      initial_value: "0"
      on_value:
        - lambda: 'id(g_dirty) = true;'

render: |
  int cpu = atoi(id(cpu_load).state.c_str());
  if (cpu < 0) cpu = 0;
  if (cpu > 100) cpu = 100;
  float load = cpu / 100.0f;
  uint32_t q = millis() / 90;                 // stable within a frame; animates the fire

  Color iron   = Color(0x2A211C);
  Color iron_d = Color(0x14100D);
  Color cream  = Color(0xE7D8C9);
  Color brand  = Color(0xD97757);             // Claude coral

  // Flame palette shifts hotter with load.
  Color f_out, f_in;
  if      (cpu < 12) { f_out = Color(0x3A1600); f_in = Color(0x6E2A00); }
  else if (cpu < 40) { f_out = Color(0xB84A00); f_in = Color(0xFF7A00); }
  else if (cpu < 70) { f_out = Color(0xFF6A00); f_in = Color(0xFFB000); }
  else if (cpu < 90) { f_out = Color(0xFF3A00); f_in = Color(0xFFD24A); }
  else               { f_out = Color(0xFF2000); f_in = Color(0xFFF4C0); }

  const char *status; Color scol;
  if      (cpu < 10) { status = "IDLE";       scol = Color(0x7C8B99); }
  else if (cpu < 40) { status = "WARMING UP"; scol = Color(0xFFB000); }
  else if (cpu < 70) { status = "WORKING";    scol = Color(0xFF8A00); }
  else if (cpu < 90) { status = "RED HOT";    scol = Color(0xFF5A2A); }
  else               { status = "MELTDOWN!";  scol = Color(0xFF3020); }

  // Header.
  it.printf(14, 10, id(font_small), cream, TextAlign::TOP_LEFT, "CLAUDE CODE");
  it.printf(228, 10, id(font_small), scol, TextAlign::TOP_RIGHT, "%s", status);

  // Furnace body + chimney. (The fire chamber is left as the black background
  // instead of a big dark fill — one fewer full-size rectangle per frame.)
  it.filled_rectangle(64, 48, 112, 138, iron);
  it.rectangle(64, 48, 112, 138, iron_d);
  it.filled_rectangle(82, 32, 20, 18, iron);
  it.rectangle(80, 66, 80, 112, brand);          // door rim only (chamber = bg)
  it.filled_circle(72, 56, 2, brand);
  it.filled_circle(168, 178, 2, brand);

  // Flames — height & flicker scale with load. 4 tongues keeps the frame light.
  int base_y = 174;
  int max_h = 8 + (int)(load * 96);
  for (int i = 0; i < 4; i++) {
    int fx = 96 + i * 16;
    float ph = q * 0.5f + i * 1.7f;
    int h = (int)(max_h * (0.65f + 0.35f * sinf(ph)));
    if (h < 4) h = 4;
    int sway = (int)(4.0f * sinf(ph * 0.7f));
    it.filled_triangle(fx - 8, base_y, fx + 8, base_y, fx + sway, base_y - h, f_out);
    it.filled_triangle(fx - 4, base_y, fx + 4, base_y, fx + sway, base_y - (int)(h * 0.62f), f_in);
  }

  // A few rising embers only when it's genuinely busy (capped, cheap).
  if (cpu >= 45) {
    int n = 2 + (int)(load * 3);
    if (n > 4) n = 4;
    int span = max_h + 36;
    for (int i = 0; i < n; i++) {
      int ex = 90 + ((i * 41) % 60);
      int ey = base_y - (int)((q * 2 + i * 29) % span);
      it.filled_circle(ex, ey, 1, (i % 2) ? Color(0xFFC060) : f_in);
    }
  }

  // CPU % readout.
  it.printf(120, 190, id(font_med), cream, TextAlign::TOP_CENTER, "CPU %d%%", cpu);

  // Load bar (matches the clock page's bottom-bar idiom).
  int bw = (int)(load * 200.0f);
  it.filled_rectangle(20, 224, 200, 5, Color(0x241A14));
  it.filled_rectangle(20, 224, bw, 5, scol);
  it.filled_circle(20 + bw, 226, 4, f_in);
