name: Stocks
description: >
  Live 5-minute candlestick chart. Type a symbol in the device web UI (`ticker`);
  the PC bridge (client/examples/stock_bridge.py) fetches 5m candles, normalizes
  them to pixels, and pushes them here as `chart_data`.
author: core

# ticker: browser-set, restores. price/change/chart_data: bridge-pushed, no
# restore (updated often). chart_data is parsed ONCE per push into globals
# (on_value) so the render never re-parses per fragment.
requires: |
  globals:
    - id: ch_n
      type: int
      restore_value: false
      initial_value: '0'
    - id: ch_o
      type: int[64]
      restore_value: false
    - id: ch_h
      type: int[64]
      restore_value: false
    - id: ch_l
      type: int[64]
      restore_value: false
    - id: ch_c
      type: int[64]
      restore_value: false
    # Overlays, computed on-device in pixel space (see chart_data on_value).
    # -1 = not enough lookback yet.
    - id: ma5
      type: int[64]
      restore_value: false
    - id: ma20
      type: int[64]
      restore_value: false
    - id: bb_up
      type: int[64]
      restore_value: false
    - id: bb_lo
      type: int[64]
      restore_value: false
    # Volume level 0..63 and RSI level 0..63 (-1 = n/a), pushed by the bridge.
    - id: vol
      type: int[64]
      restore_value: false
    - id: rsi
      type: int[64]
      restore_value: false

  text:
    - platform: template
      name: "ticker"
      id: ticker
      optimistic: true
      restore_value: true
      mode: text
      min_length: 0
      max_length: 10
      initial_value: "AAPL"
    - platform: template
      name: "stock_price"
      id: stock_price
      optimistic: true
      mode: text
      min_length: 0
      max_length: 12
      initial_value: "--"
    - platform: template
      name: "stock_change"
      id: stock_change
      optimistic: true
      mode: text
      min_length: 0
      max_length: 12
      initial_value: ""
    - platform: template
      name: "stock_high"          # day-high move vs prev close, e.g. "+2.1%"
      id: stock_high
      optimistic: true
      mode: text
      min_length: 0
      max_length: 14
      initial_value: ""
    - platform: template
      name: "stock_low"           # day-low move vs prev close, e.g. "-0.5%"
      id: stock_low
      optimistic: true
      mode: text
      min_length: 0
      max_length: 14
      initial_value: ""
    - platform: template
      # Market session badge: REGULAR / PRE / POST / CLOSED. Pushed by the PC
      # bridge from Yahoo's currentTradingPeriod. No restore (changes often).
      name: "market_state"
      id: market_state
      optimistic: true
      mode: text
      min_length: 0
      max_length: 8
      initial_value: ""
    - platform: template
      name: "chart_data"
      id: chart_data
      optimistic: true
      mode: text
      min_length: 0
      max_length: 255            # ESPHome caps text at 255
      initial_value: ""
      on_value:
        # Compact encoding: 4 base64url chars per candle (o,h,l,c), each a
        # level 0..63 (0 = top/high). Decode + scale to pixels ONCE per push
        # into the globals; the render never re-parses per fragment.
        - lambda: |-
            auto dec = [](char ch) -> int {
              if (ch >= 'A' && ch <= 'Z') return ch - 'A';
              if (ch >= 'a' && ch <= 'z') return ch - 'a' + 26;
              if (ch >= '0' && ch <= '9') return ch - '0' + 52;
              if (ch == '-') return 62;
              if (ch == '_') return 63;
              return 0;
            };
            const std::string &s = x;
            int n = s.size() / 4;
            if (n > 64) n = 64;
            const int CH = 104;   // price-panel height (must match render Y0..)
            for (int i = 0; i < n; i++) {
              id(ch_o)[i] = dec(s[i*4+0]) * CH / 63;
              id(ch_h)[i] = dec(s[i*4+1]) * CH / 63;
              id(ch_l)[i] = dec(s[i*4+2]) * CH / 63;
              id(ch_c)[i] = dec(s[i*4+3]) * CH / 63;
            }
            id(ch_n) = n;
            // Indicators in pixel space (pixel = linear transform of price, so
            // they overlay directly). Done once here, never in the render.
            // MA5 = 5-candle SMA (25m); MA20 = 20-candle SMA (100m) = Bollinger
            // mid; bands = mid ± 2 * stddev. -1 = insufficient lookback.
            for (int i = 0; i < n; i++) {
              if (i >= 4) {
                long s5 = 0; for (int j = i - 4; j <= i; j++) s5 += id(ch_c)[j];
                id(ma5)[i] = (int)(s5 / 5);
              } else id(ma5)[i] = -1;
              if (i >= 19) {
                long s20 = 0; for (int j = i - 19; j <= i; j++) s20 += id(ch_c)[j];
                int mid = (int)(s20 / 20);
                long var = 0;
                for (int j = i - 19; j <= i; j++) { long d = id(ch_c)[j] - mid; var += d * d; }
                int sd = (int) sqrtf((float)(var / 20));
                int up = mid - 2 * sd; if (up < 0) up = 0;
                int lo = mid + 2 * sd; if (lo > CH) lo = CH;
                id(ma20)[i] = mid; id(bb_up)[i] = up; id(bb_lo)[i] = lo;
              } else { id(ma20)[i] = -1; id(bb_up)[i] = -1; id(bb_lo)[i] = -1; }
            }
    - platform: template
      # Per-candle volume, 1 base64url char each = level 0..63 (0..maxvol).
      name: "vol_data"
      id: vol_data
      optimistic: true
      mode: text
      min_length: 0
      max_length: 64
      initial_value: ""
      on_value:
        - lambda: |-
            auto d = [](char ch) -> int {
              if (ch >= 'A' && ch <= 'Z') return ch - 'A';
              if (ch >= 'a' && ch <= 'z') return ch - 'a' + 26;
              if (ch >= '0' && ch <= '9') return ch - '0' + 52;
              if (ch == '-') return 62; if (ch == '_') return 63; return 0;
            };
            const std::string &s = x; int m = s.size(); if (m > 64) m = 64;
            for (int i = 0; i < m; i++) id(vol)[i] = d(s[i]);
    - platform: template
      # Per-candle RSI(14), 1 char each = level 0..63 (0..100). '.' = n/a.
      name: "rsi_data"
      id: rsi_data
      optimistic: true
      mode: text
      min_length: 0
      max_length: 64
      initial_value: ""
      on_value:
        - lambda: |-
            auto d = [](char ch) -> int {
              if (ch >= 'A' && ch <= 'Z') return ch - 'A';
              if (ch >= 'a' && ch <= 'z') return ch - 'a' + 26;
              if (ch >= '0' && ch <= '9') return ch - '0' + 52;
              if (ch == '-') return 62; if (ch == '_') return 63; return 0;
            };
            const std::string &s = x; int m = s.size(); if (m > 64) m = 64;
            for (int i = 0; i < m; i++) { char c = s[i]; id(rsi)[i] = (c == '.') ? -1 : d(c); }

# Header: ticker + price + change. Body: 5m candlesticks from the globals.
render: |
  it.printf(8, 6, id(font_med), Color(0x9AA7B4), TextAlign::TOP_LEFT, "%s", id(ticker).state.c_str());
  it.printf(232, 6, id(font_med), Color(0xFFFFFF), TextAlign::TOP_RIGHT, "%s", id(stock_price).state.c_str());
  std::string chg = id(stock_change).state;
  Color cc = (!chg.empty() && chg[0] == '+') ? Color(0x00E36B)
           : (!chg.empty() && chg[0] == '-') ? Color(0xFF4060) : Color(0x9AA7B4);
  it.printf(232, 34, id(font_small), cc, TextAlign::TOP_RIGHT, "%s", chg.c_str());
  // Market-session badge (top-left, under the ticker).
  std::string ms = id(market_state).state;
  const char *lbl = ""; Color bg = Color(0x000000); int bw = 0;
  if (ms == "REGULAR")     { lbl = "LIVE";   bg = Color(0x00A24B); bw = 44; }
  else if (ms == "PRE")    { lbl = "PRE";    bg = Color(0xE59400); bw = 40; }
  else if (ms == "POST")   { lbl = "AFTER";  bg = Color(0x3B6BE5); bw = 54; }
  else if (ms == "CLOSED") { lbl = "CLOSED"; bg = Color(0x5A6472); bw = 62; }
  if (bw > 0) {
    it.filled_rectangle(8, 36, bw, 18, bg);
    it.printf(8 + bw / 2, 45, id(font_small), Color(0xFFFFFF), TextAlign::CENTER, "%s", lbl);
  }
  int n = id(ch_n);
  // Three stacked panels: price (candles+MA+BB), volume, RSI.
  const int X0 = 6, Y0 = 60, CW = 228;   // price panel top; candle y-offsets 0..104
  const int VY = 172, VH = 18;           // volume panel
  const int RY = 196, RH = 36;           // RSI panel (0..100)
  if (n <= 0) {
    it.printf(120, 110, id(font_small), Color(0x808A94), TextAlign::CENTER, "waiting for data...");
  } else {
    int bw = CW / n; if (bw < 2) bw = 2;
    // --- price panel: candlesticks ---
    for (int i = 0; i < n; i++) {
      int cx = X0 + i * bw + bw / 2;
      bool up = id(ch_c)[i] <= id(ch_o)[i];   // smaller y = higher price
      Color k = up ? Color(0x00E36B) : Color(0xFF4060);
      it.line(cx, Y0 + id(ch_h)[i], cx, Y0 + id(ch_l)[i], k);   // wick
      int a = id(ch_o)[i], b = id(ch_c)[i]; if (a > b) { int t = a; a = b; b = t; }
      int bx = X0 + i * bw + 1, wd = (bw - 2 >= 1 ? bw - 2 : 1);
      it.filled_rectangle(bx, Y0 + a, wd, (b - a >= 1 ? b - a : 1), k);   // body
    }
    // MA/BB overlays on top (oy = panel top; arr holds y-offset, -1 = gap).
    auto poly = [&](int *arr, int oy, Color col) {
      int px = -1, py = 0;
      for (int i = 0; i < n; i++) {
        if (arr[i] < 0) { px = -1; continue; }
        int cx = X0 + i * bw + bw / 2, cy = oy + arr[i];
        if (px >= 0) it.line(px, py, cx, cy, col);
        px = cx; py = cy;
      }
    };
    poly(id(bb_up), Y0, Color(0x50606E));
    poly(id(bb_lo), Y0, Color(0x50606E));
    poly(id(ma20), Y0, Color(0xFF9500));
    poly(id(ma5),  Y0, Color(0x2E86FF));

    // Right-side swing readout: how far up/down vs prev close (compact %).
    // high% near the top, low% near the bottom; colored by sign.
    {
      std::string hp = id(stock_high).state, lp = id(stock_low).state;
      Color hpc = (!hp.empty() && hp[0] == '-') ? Color(0xFF4060) : Color(0x00E36B);
      Color lpc = (!lp.empty() && lp[0] == '-') ? Color(0xFF4060) : Color(0x00E36B);
      if (!hp.empty()) {
        it.filled_rectangle(X0 + CW - 42, Y0, 42, 15, Color(0x0A0E14));
        it.printf(X0 + CW - 2, Y0 + 1, id(font_small), hpc, TextAlign::TOP_RIGHT, "%s", hp.c_str());
      }
      if (!lp.empty()) {
        it.filled_rectangle(X0 + CW - 42, Y0 + 89, 42, 15, Color(0x0A0E14));
        it.printf(X0 + CW - 2, Y0 + 90, id(font_small), lpc, TextAlign::TOP_RIGHT, "%s", lp.c_str());
      }
    }

    // --- volume panel: bars grow up from the baseline, colored by direction ---
    it.line(X0, VY - 3, X0 + CW, VY - 3, Color(0x1B222B));
    for (int i = 0; i < n; i++) {
      int h = id(vol)[i] * VH / 63; if (h < 1 && id(vol)[i] > 0) h = 1;
      bool up = id(ch_c)[i] <= id(ch_o)[i];
      Color vc = up ? Color(0x1E5A3A) : Color(0x5A2530);
      int bx = X0 + i * bw + 1, wd = (bw - 2 >= 1 ? bw - 2 : 1);
      it.filled_rectangle(bx, VY + VH - h, wd, h, vc);
    }

    // --- RSI panel: 0..100 flow with 30/70 guide lines, current value at right ---
    it.line(X0, RY - 3, X0 + CW, RY - 3, Color(0x1B222B));
    int y70 = RY + (100 - 70) * RH / 100;
    int y30 = RY + (100 - 30) * RH / 100;
    it.line(X0, y70, X0 + CW, y70, Color(0x3A2530));   // overbought
    it.line(X0, y30, X0 + CW, y30, Color(0x22392E));   // oversold
    int rpx = -1, rpy = 0, last = -1;
    for (int i = 0; i < n; i++) {
      if (id(rsi)[i] < 0) { rpx = -1; continue; }
      int cx = X0 + i * bw + bw / 2, cy = RY + (63 - id(rsi)[i]) * RH / 63;
      if (rpx >= 0) it.line(rpx, rpy, cx, cy, Color(0xC060E0));   // RSI (purple)
      rpx = cx; rpy = cy; last = id(rsi)[i];
    }
    if (last >= 0) {
      int rv = last * 100 / 63;
      Color rc = rv >= 70 ? Color(0xFF6060) : (rv <= 30 ? Color(0x40C080) : Color(0x9AA7B4));
      it.printf(X0 + CW, RY - 2, id(font_small), rc, TextAlign::TOP_RIGHT, "RSI %d", rv);
    }
  }
