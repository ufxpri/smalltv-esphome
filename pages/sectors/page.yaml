name: Sectors
description: >
  S&P 500 sector heatmap. A 3x4 grid of the 11 SPDR sector ETFs plus SPY,
  each tile colored green/red by its daily % change (intensity = magnitude).
  The PC bridge (client/widget SectorBridge) fetches the 12 % changes and
  pushes them here as `heatmap_data` — a CSV of tenths-of-percent.
author: you

requires: |
  globals:
    - id: sec_t          # per-tile daily change in tenths of % (e.g. 12 = +1.2%)
      type: int[16]
      restore_value: false
    - id: sec_n
      type: int
      restore_value: false
      initial_value: '0'

  text:
    - platform: template
      name: "heatmap_data"
      id: heatmap_data
      optimistic: true
      mode: text
      min_length: 0
      max_length: 120
      initial_value: ""
      on_value:
        # CSV of up to 12 signed ints (tenths of %), parsed once per push.
        - lambda: |-
            const std::string &s = x;
            int i = 0; size_t start = 0;
            while (i < 16 && start <= s.size()) {
              size_t c = s.find(',', start);
              std::string tok = (c == std::string::npos) ? s.substr(start) : s.substr(start, c - start);
              if (!tok.empty()) id(sec_t)[i++] = atoi(tok.c_str());
              if (c == std::string::npos) break;
              start = c + 1;
            }
            id(sec_n) = i;
            id(g_dirty) = true;   // new sector data -> redraw

# 3 cols x 4 rows. Each cell = a THIN color bar (green/red by %, intensity by
# magnitude) + label + %. CRITICAL: the fractional framebuffer re-runs this
# lambda ~30x/frame, and filled_rectangle loops every pixel it covers — big
# tiles froze the core (Wi-Fi starvation). So we keep the filled area tiny
# (60x8 bars, not full tiles) AND cull anything off the current fragment strip
# via the clip rect, so each pass draws almost nothing.
render: |
  static const char *NM[12] = {"Tech","Fin","Health","ConsD","Comm","Indu",
                               "Staple","Enrgy","Util","RealE","Matl","SPY"};
  int n = id(sec_n);
  if (n <= 0) {
    it.printf(120, 120, id(font_small), Color(0x808A94), TextAlign::CENTER, "waiting for data...");
  } else {
    const int COLS = 3, CW = 80, CH = 56, TY = 10;
    auto clip = it.get_clipping();
    bool hasclip = clip.h > 0;
    int cy0 = hasclip ? clip.y : 0;
    int cy1 = hasclip ? clip.y + clip.h : 240;
    for (int i = 0; i < 12 && i < n; i++) {
      int x = (i % COLS) * CW, y = TY + (i / COLS) * CH;
      if (y + CH < cy0 || y > cy1) continue;                 // cell off this strip
      int t = id(sec_t)[i];
      int cx = x + CW / 2, a = t < 0 ? -t : t;
      if (y + 4 <= cy1 && y + 12 >= cy0) {                   // color bar row
        int mag = a > 30 ? 30 : a;
        int inten = 55 + mag * 190 / 30;                     // 55..245
        Color bg = (t >= 0) ? Color(0, inten, inten / 4) : Color(inten, inten / 5, inten / 5);
        it.filled_rectangle(x + 10, y + 4, CW - 20, 8, bg);  // 60x8 bar
      }
      if (y + 16 <= cy1 && y + 30 >= cy0)                    // label row
        it.printf(cx, y + 16, id(font_small), Color(0xFFFFFF), TextAlign::TOP_CENTER, "%s", NM[i]);
      if (y + 33 <= cy1 && y + 47 >= cy0)                    // value row
        it.printf(cx, y + 33, id(font_small),
                  (t < 0 ? Color(0xFF6060) : Color(0x40D080)), TextAlign::TOP_CENTER,
                  "%c%d.%d%%", (t < 0 ? '-' : '+'), a / 10, a % 10);
    }
  }
